spring.application.name=DNSparser
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.threads.virtual.enabled=true
server.port=8088

management.endpoints.web.exposure.include=prometheus,health,info
management.metrics.tags.application=dns-monitoring-bot
spring.datasource.hikari.register-mbeans=true
management.prometheus.metrics.export.enabled=true
management.metrics.enable.jvm=true

dns.browser.path=${BROWSER_PATH:/usr/bin/chromium}
dns_real_profile_path=${DNS_REAL_PROFILE_PATH:./data/browser_profile}
project.path=${user.dir}/
dns.link.prefix=https://www.dns-shop.ru/catalog/markdown/
dns.link.products.filters=https://www.dns-shop.ru/catalogMarkdown/markdown/products-filters/
dns.link.referer=https://www.dns-shop.ru
dns.link.ajax.state=https://www.dns-shop.ru/ajax-state/product-buy/
dns.city=\u0420\u043E\u0441\u0442\u043E\u0432-\u043D\u0430-\u0414\u043E\u043D\u0443
