services:
  db:
    image: postgres:16-alpine
    container_name: dns_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dns
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: dns_bot
    volumes:
      - /home/vgribv/dns_real_profile:/app/dns_real_profile
      - ./data:/app/data
    network_mode: "host"
    restart: always
    environment:
      TZ: Europe/Moscow
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_NAME: ${BOT_NAME}
      PROXY_HOST: ${PROXY_HOST}
      PROXY_PORT: ${PROXY_PORT}
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: dns_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:12.4.2
    container_name: dns_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    depends_on:
      - prometheus

volumes:
  pgdata:


